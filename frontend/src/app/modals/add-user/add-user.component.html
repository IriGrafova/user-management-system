<h2>Добавить пользователя</h2>
<form [formGroup]="form" (ngSubmit)="addUser()">
  <mat-dialog-content>
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Полное имя</mat-label>
      <input matInput formControlName="name" placeholder="Введите имя" />
      @if(form.get('name')?.invalid) {
        <mat-error>
          Поле обязательно, минимум 2 символа
        </mat-error>
      }
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Email</mat-label>
      <input matInput formControlName="email" placeholder="Введите email" />
      @if(form.get('email')?.invalid) {
        <mat-error>
          Поле обязательно, валидный email
        </mat-error>
      }
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Возраст</mat-label>
      <input matInput formControlName="age" placeholder="Введите возраст" />
      @if(form.get('age')?.invalid) {
        <mat-error>
          Максимальное значение 110
        </mat-error>
      }
    </mat-form-field>
  </mat-dialog-content>

  <mat-dialog-actions>
    <button mat-button type="button" (click)="closeModal()">Отмена</button>
    <button mat-raised-button color="primary" type="submit" [disabled]="!form.valid">Добавить</button>
  </mat-dialog-actions>
</form>
